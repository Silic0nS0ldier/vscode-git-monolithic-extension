packages:
  - packages/*
  - build_defs/*
  - extension

allowBuilds: { '@vscode/vsce-sign': false, keytar: false }

catalog:
  '@formatjs/intl-durationformat': ^0.10.18
  '@js-temporal/polyfill': ^0.5.1
  '@types/node': ^25.9.4
  ava: ^8.0.1
  cleye: ^2.6.0
  get-stream: ^9.0.1

catalogs:
  vscode:
    '@types/node': ^22.19.19

packageExtensions:
  "@secretlint/resolver":
    dependencies:
      "@secretlint/secretlint-rule-basicauth": "^10.2.2"
      "@secretlint/secretlint-rule-no-dotenv": "^10.2.2"
      "@secretlint/secretlint-rule-npm": "^10.2.2"
      "@secretlint/secretlint-rule-preset-recommend": "^10.2.2"
      "@secretlint/secretlint-rule-privatekey": "^10.2.2"
  "@textlint/resolver":
    dependencies:
      "@secretlint/secretlint-formatter-sarif": "^10.2.2"
  # chalk added as workaround for https://github.com/aspect-build/rules_lint/issues/752
  "eslint":
    dependencies:
      "chalk": "^4.0.0"

patchedDependencies:
  "watcher@2.3.1": "patches/watcher@2.3.1.patch"
