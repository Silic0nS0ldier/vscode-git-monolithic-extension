name: "CI"
on:
  push:
    branches:
      - main
  # Pull request
  pull_request:
    types:
      # Newly opened
      - opened
      # Updated (excludes change of base branch)
      - synchronize
jobs:
  renovate_tasks:
    if: github.actor == 'renovate[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    outputs:
      commit_hash: ${{ steps.get_commit.outputs.COMMIT_HASH }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Required to have correct ref for git-auto-commit-action
          ref: ${{ github.head_ref }}
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelrc: |
            common --color=yes
            common --curses=no
            common --show_progress_rate_limit=5
          cache-save: false
          bazelisk-cache: true
          # Repo cache not worth it here, very little to fetch.
          repository-cache: false
      - run: node ./.github/workflows/update_bazel_nodejs.mjs ./.devcontainer/feature-bazel/install.sh ./MODULE.bazel
      - run: bazel mod deps --lockfile_mode=update
      - uses: stefanzweifel/git-auto-commit-action@v7
      - id: get_commit
        run: echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
  build_and_test:
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() }}
    needs: renovate_tasks
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.renovate_tasks.outputs.commit_hash || github.head_ref }}
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelrc: |
            common --color=yes
            common --curses=no
            common --show_progress_rate_limit=5
            common --lockfile_mode=error
          cache-save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          bazelisk-cache: true
          disk-cache: "${{ github.workflow }}-test"
          repository-cache: |
            - build_defs/rust_wasm_bindgen/Cargo.toml
            - Cargo.lock
            - Cargo.toml
            - MODULE.bazel
            - MODULE.bazel.lock
            - multitool.lock.json
            - packages/wasm/Cargo.toml
            - pnpm-lock.yaml
      - run: bazel test //...
        id: test
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: steps.test.outcome == 'failure'
        with:
          name: test-logs
          path: .bazel/testlogs/**/test.log
      - run: bazel build //extension/vsix:git_monolithic --stamp
        id: build_vsix
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: steps.build_vsix.outcome != 'failure'
        with:
          name: git-monolithic-vsix
          path: .bazel/bin/extension/vsix/git_monolithic.vsix
      - run: exit 1
        if: steps.test.outcome == 'failure' || steps.build_vsix.outcome == 'failure'
  devcontainer:
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    if: ${{ !cancelled() }}
    needs: renovate_tasks
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.renovate_tasks.outputs.commit_hash || github.head_ref }}
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: echo "Built successfully"