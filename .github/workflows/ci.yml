name: "CI"
on:
  push:
    branches:
      - main
  # Pull request
  pull_request:
    types:
      # Newly opened
      - opened
      # Updated (excludes change of base branch)
      - synchronize
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: "${{ github.workflow }}-test"
          repository-cache: true
      - run: bazel test //...
        id: test
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: steps.test.outcome == 'failure'
        with:
          name: test-logs
          path: .bazel/testlogs/**/test.log
      - run: bazel build //extension/vsix:git_monolithic --stamp
        id: build_vsix
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: steps.build_vsix.outcome != 'failure'
        with:
          name: git-monolithic-vsix
          path: .bazel/bin/extension/vsix/git_monolithic.vsix
      - run: exit 1
        if: steps.test.outcome == 'failure' || steps.build_vsix.outcome == 'failure'
  devcontainer:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: echo "Built successfully"